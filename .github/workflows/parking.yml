name: AirGarage Parking Automation

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run manually'
        required: true
        default: start
        type: choice
        options:
          - start
          - end

permissions:
  contents: write

jobs:
  start-parking:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'start'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airgarage-automation
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start parking session
        env:
          AIRGARAGE_SESSION_ID: ${{ secrets.AIRGARAGE_SESSION_ID }}
        run: node start_parking.js

      - name: Commit rental UUID
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f rental_uuid.txt
          git diff --staged --quiet || git commit -m "Save rental UUID [skip ci]"
          git push

  end-parking:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'end'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airgarage-automation
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: End parking session
        env:
          AIRGARAGE_SESSION_ID: ${{ secrets.AIRGARAGE_SESSION_ID }}
        run: node end_parking.js
