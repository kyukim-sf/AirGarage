name: AirGarage Parking Automation

on:
  schedule:
      - cron: '15 15 * * 1-5'
          - cron: '13 17 * * 1-5'
            workflow_dispatch:
                inputs:
                      action:
                              description: 'Action to run manually'
                                      required: true
                                              default: 'start'
                                                      type: choice
                                                              options:
                                                                        - start
                                                                                  - end

                                                                                  jobs:
                                                                                    start-parking:
                                                                                        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'start' || github.event.schedule == '15 15 * * 1-5'
                                                                                            runs-on: ubuntu-latest
                                                                                                steps:
                                                                                                      - name: Checkout repo
                                                                                                              uses: actions/checkout@v4
                                                                                                              
                                                                                                                    - name: Setup Node.js
                                                                                                                            uses: actions/setup-node@v4
                                                                                                                                    with:
                                                                                                                                              node-version: '20'
                                                                                                                                              
                                                                                                                                                    - name: Install dependencies
                                                                                                                                                            run: |
                                                                                                                                                                      npm install playwright
                                                                                                                                                                                npx playwright install chromium --with-deps
                                                                                                                                                                                
                                                                                                                                                                                      - name: Start parking session
                                                                                                                                                                                              run: node start_parking.js
                                                                                                                                                                                              
                                                                                                                                                                                                end-parking:
                                                                                                                                                                                                    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'end' || github.event.schedule == '13 17 * * 1-5'
