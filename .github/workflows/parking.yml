name: AirGarage Parking Automation

on:
  schedule:
    - cron: '15 15 * * 1-5'
    - cron: '13 17 * * 1-5'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run manually'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - end

jobs:
  start-parking:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'start' || github.event.schedule == '15 15 * * 1-5'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airgarage-automation
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start parking session
        run: node start_parking.js
      - name: Commit rental UUID
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add rental_uuid.txt
          git commit -m "Save rental UUID [skip ci]"
          git push

  end-parking:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'end' || github.event.schedule == '13 17 * * 1-5'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airgarage-automation
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: End parking session
        run: node end_parking.js
